<!DOCTYPE html>
<html>
<head><title>Secure App</title></head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>{% for msg in messages %}<li>{{ msg }}</li>{% endfor %}</ul>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
